                            300: "#fcd34d",
                            400: "#fbbf24",
                            500: "#f59e0b",
                            600: "#d97706",
                            700: "#b45309",
                            800: "#92400e",

                        },
                        accent: {

    <style>
        .hero-slide {
            background-size: cover;
            background-position: center;
            height: 100vh;
            min-height: 600px;
            position: relative;
            overflow: hidden;
        }

        .hero-slide::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg,
                    rgba(0, 0, 0, 0.7) 0%,
                    rgba(0, 0, 0, 0.3) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .floating-element {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .swiper-pagination-bullet {
            width: 12px;
            height: 12px;
            background: white;
            opacity: 0.5;
            transition: all 0.3s;
        }

        .swiper-pagination-bullet-active {
            opacity: 1;
            background: #f59e0b;
            transform: scale(1.2);
        }

        .course-card {
            transition: all 0.3s ease;
            border-radius: 12px;
            overflow: hidden;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1),
                0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .feature-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>

</head>

<body class="bg-gray-50 font-sans">

    <!-- Include Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

    <!-- Login Page -->
    <div id="login-page"
        class="relative min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-200 via-white to-indigo-100 overflow-hidden px-4 py-12">

        <!-- Background Decorative Blobs -->
        <div
            class="absolute top-0 left-0 w-72 h-72 bg-grey-800 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-pulse">
        </div>
        <div
            class="absolute bottom-0 right-0 w-72 h-72 bg-secondary-500 rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-pulse delay-200">
        </div>

        <!-- Card -->
        <div
            class="w-full max-w-md z-10 backdrop-blur-md bg-white/60 rounded-2xl shadow-xl px-8 py-10 space-y-6 border border-white/30">

            <!-- Logo -->
            <div class="flex items-center justify-center space-x-2">
                <div class="w-10 h-10 bg-secondary-500 rounded-full flex items-center justify-center">
                    <a href="/"><i class="fas fa-graduation-cap text-white text-xl"></i>
                </div>
                <span class="text-2xl font-bold">Smart<span class="text-secondary-500">Gyan</span></span></a>
            </div>

            <!-- Form -->
            <form id="login-form" onsubmit="event.preventDefault(); handleLogin();" class="space-y-5">
                <div id="error-message" class="hidden text-sm text-red-600 bg-red-100 px-3 py-2 rounded"></div>

                <div>
                    <label for="email" class="block mb-1 text-sm font-medium text-gray-700">Email</label>
                    <input id="email" type="email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 backdrop-blur-sm" />
                </div>

                <div>
                    <label for="password" class="block mb-1 text-sm font-medium text-gray-700">Password</label>
                    <input id="password" type="password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white/80 backdrop-blur-sm" />
                </div>

                <button id="login-button"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg shadow-md transition duration-300">
                    Login
                </button>

                <!-- <p class="text-sm text-center text-gray-600">
        Don't have an account?
        <a href="/signup" class="text-indigo-600 hover:underline">Sign up</a>
      </p> -->
            </form>
        </div>
    </div>


    <!-- Dashboard -->
    <div id="dashboard-page" class="hidden min-h-screen bg-gray-50">
        <header class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-secondary-500 rounded-full flex items-center justify-center">
                        <a href="/"><i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <span class="text-2xl font-bold">Smart<span class="text-secondary-500">Gyan</span></span></a>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="student-name" class="text-sm font-medium text-gray-700">Loading...</span>
                    <img src="https://cdn3.iconfinder.com/data/icons/web-design-and-development-2-6/512/87-1024.png"
                        class="h-8 w-8 rounded-full" />
                    <button onclick="handleLogout()"
                        class="bg-red-500 hover:bg-red-600 text-white px-4 py-1 rounded">Logout</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <h2 class="text-2xl font-bold mb-4">Welcome to Your Courses</h2>
            <div id="course-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

            <!-- Updated Course Detail View -->
            <div id="course-detail" class="hidden mt-6">
                <div class="mb-4">
                    <button onclick="closeCourseDetail()"
                        class="flex items-center text-indigo-600 hover:text-indigo-800 font-medium">
                        <i class="fas fa-arrow-left mr-2"></i>
                        Back to courses
                    </button>
                </div>

                <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                    <div class="bg-indigo-600 text-white p-4">
                        <h3 id="course-title" class="text-2xl font-bold"></h3>
                    </div>

                    <div class="flex flex-col lg:flex-row min-h-[600px]">
                        <!-- Left Side - Video Player and Chapter Info -->
                        <div class="lg:w-2/3 p-6">
                            <div class="space-y-4">
                                <!-- Video Container -->
                                <div class="bg-black rounded-lg overflow-hidden">
                                    <iframe id="current-video" class="w-full h-64 md:h-80 lg:h-96" src=""
                                        frameborder="0" allowfullscreen></iframe>
                                </div>

                                <!-- Chapter Title and Description -->
                                <div class="bg-gray-50 p-4 rounded-lg">
                                    <h4 id="current-chapter-title" class="text-xl font-bold text-gray-800 mb-2">Select a
                                        chapter to start learning</h4>
                                    <p id="current-chapter-description" class="text-gray-600 leading-relaxed">Choose a
                                        chapter from the list on the right to begin watching the video content.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Right Side - Chapter List -->
                        <div class="lg:w-1/3 bg-gray-50 border-l border-gray-200">
                            <div class="p-4 border-b border-gray-200 bg-gray-100">
                                <h4 class="font-semibold text-gray-800">Course Chapters</h4>
                            </div>
                            <div class="p-4">
                                <ul id="chapter-list" class="space-y-2"></ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDBrJ3w_fbYYQxD3DsJW0F10feyj_T0T5k",
            authDomain: "thesmartgyan-2043c.firebaseapp.com",
            projectId: "thesmartgyan-2043c",
            storageBucket: "thesmartgyan-2043c.firebasestorage.app",
            messagingSenderId: "19351680227",
            appId: "1:19351680227:web:cfe695444483e3dbde01d6",
            measurementId: "G-MJZJ0TVJBZ"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentCourse = null;
        let currentChapterIndex = 0;

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const uid = userCredential.user.uid;
                fetchUserCourseData(uid);
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard-page').classList.remove('hidden');
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.remove('hidden');
            }
        }

        function handleLogout() {
            auth.signOut().then(() => {
                // Note: Using variables instead of localStorage for Claude.ai compatibility
                currentCourse = null;
                currentChapterIndex = 0;
                localStorage.clear()
                document.getElementById('dashboard-page').classList.add('hidden');
                document.getElementById('login-page').classList.remove('hidden');
            });
        }

        function fetchUserCourseData(uid) {
            db.collection("Users").doc(uid).get()
                .then((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        // Store in variable instead of localStorage
                        window.userCourseData = data;
                        console.log("User course data fetched:", data);
                        localStorage.setItem("userCourseData", JSON.stringify(data)); // For compatibility with other parts of the app
                        document.getElementById("student-name").textContent = data.name || "Student";
                        loadCourses()
                    }
                });
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard-page').classList.remove('hidden');
                const uid = user.uid;
                fetchUserCourseData(uid);
                loadCourses();
            } else {
                document.getElementById('login-page').classList.remove('hidden');
                document.getElementById('dashboard-page').classList.add('hidden');
            }
        });
        async function loadCourses() {
            try {
                let courses;
                try {
                    const res = await fetch('courses.json');
                    courses = await res.json();
                } catch {
                    courses = mockCourses;
                }

                // 🔐 Filter only allowed courses from localStorage
                const userData = JSON.parse(localStorage.getItem("userCourseData") || "{}");
                const allowedCourseIds = (userData.Course || "").split(",").map(id => id.trim());

                const container = document.getElementById('course-container');
                container.innerHTML = '';

                courses
                    .filter(course => allowedCourseIds.includes(course.courseId))
                    .forEach((course, index) => {
                        const div = document.createElement('div');
                        div.className = 'bg-white shadow-md rounded-lg overflow-hidden cursor-pointer hover:shadow-lg transition-shadow duration-300';
                        div.innerHTML = `
          <img src="${course.banner}" class="w-full h-48 object-cover" />
          <div class="p-4">
            <h4 class="text-lg font-semibold text-gray-800">${course.name}</h4>
            <p class="text-sm text-gray-600 mt-1">${course.chapters.length} Chapters</p>
            <div class="mt-3">
              <span class="inline-block bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded-full">
                <i class="fas fa-play mr-1"></i>
                Start Learning
              </span>
            </div>
          </div>
        `;
                        div.addEventListener('click', () => showCourseDetail(course));
                        container.appendChild(div);
                    });
            } catch (err) {
                console.error("Failed to load courses", err);
            }
        }

        function showCourseDetail(course) {
            currentCourse = course;
            currentChapterIndex = 0;

            document.getElementById('course-container').classList.add('hidden');
            document.getElementById('course-detail').classList.remove('hidden');
            document.getElementById('course-title').textContent = course.name;

            const list = document.getElementById('chapter-list');
            list.innerHTML = '';

            course.chapters.forEach((chapter, idx) => {
                const item = document.createElement('li');
                item.className = `p-3 rounded-lg cursor-pointer transition-colors duration-200 ${idx === currentChapterIndex
                    ? 'bg-indigo-100 border-l-4 border-indigo-500'
                    : 'hover:bg-gray-100'
                    }`;

                item.innerHTML = `
          <div class="flex items-start">
            <div class="flex-shrink-0 mt-1">
              <span class="inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-medium ${idx === currentChapterIndex
                        ? 'bg-indigo-500 text-white'
                        : 'bg-gray-300 text-gray-700'
                    }">
                ${idx + 1}
              </span>
            </div>
            <div class="ml-3 flex-1">
              <h5 class="font-medium text-gray-800 text-sm">${chapter.title}</h5>
              <p class="text-xs text-gray-500 mt-1 line-clamp-2">${chapter.description}</p>
            </div>
          </div>
        `;

                item.addEventListener('click', () => selectChapter(idx));
                list.appendChild(item);
            });

            // Load first chapter by default
            if (course.chapters.length > 0) {
                selectChapter(0);
            }
        }

        function selectChapter(index) {
            if (!currentCourse || !currentCourse.chapters[index]) return;

            currentChapterIndex = index;
            const chapter = currentCourse.chapters[index];

            // Update video
            document.getElementById('current-video').src = chapter.video;

            // Update chapter info
            document.getElementById('current-chapter-title').textContent = `${index + 1}. ${chapter.title}`;
            document.getElementById('current-chapter-description').textContent = chapter.description;

            // Update chapter list styling
            const list = document.getElementById('chapter-list');
            Array.from(list.children).forEach((item, idx) => {
                const span = item.querySelector('span');
                if (idx === index) {
                    item.className = 'p-3 rounded-lg cursor-pointer transition-colors duration-200 bg-indigo-100 border-l-4 border-indigo-500';
                    span.className = 'inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-medium bg-indigo-500 text-white';
                } else {
                    item.className = 'p-3 rounded-lg cursor-pointer transition-colors duration-200 hover:bg-gray-100';
                    span.className = 'inline-flex items-center justify-center w-6 h-6 rounded-full text-xs font-medium bg-gray-300 text-gray-700';
                }
            });
        }

        function closeCourseDetail() {
            document.getElementById('course-detail').classList.add('hidden');
            document.getElementById('course-container').classList.remove('hidden');

            // Reset video
            document.getElementById('current-video').src = '';
            currentCourse = null;
            currentChapterIndex = 0;
        }
    </script>
</body>
