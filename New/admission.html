<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission Process</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
  </head>
  <body class="bg-gray-50">
    <div class="container mx-auto px-4 py-8 max-w-2xl">
      <div id="payment-form" class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-2xl font-bold mb-6">Complete Your Enrollment</h2>

        <div id="course-info" class="mb-6 p-4 bg-gray-100 rounded-lg">
          <!-- Course info will be loaded here -->
        </div>

        <form id="payment-form" class="space-y-4">
          <div>
            <label class="block text-gray-700 mb-2">Full Name</label>
            <input
              type="text"
              required
              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label class="block text-gray-700 mb-2">Email</label>
            <input
              type="email"
              required
              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div>
            <label class="block text-gray-700 mb-2">Card Number</label>
            <input
              type="text"
              placeholder="4242 4242 4242 4242"
              required
              class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-700 mb-2">Expiry Date</label>
              <input
                type="text"
                placeholder="MM/YY"
                required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
            <div>
              <label class="block text-gray-700 mb-2">CVV</label>
              <input
                type="text"
                placeholder="123"
                required
                class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
            </div>
          </div>

          <button
            type="button"
            onclick="processPayment()"
            class="w-full bg-green-600 hover:bg-green-700 text-white py-3 px-4 rounded-lg font-medium transition mt-6"
          >
            Pay Now
          </button>
        </form>
      </div>

      <div
        id="success-message"
        class="hidden bg-white rounded-lg shadow-md p-6 text-center"
      >
        <div class="text-green-500 text-6xl mb-4">✓</div>
        <h2 class="text-2xl font-bold mb-2">Payment Successful!</h2>
        <p id="success-details" class="text-gray-600 mb-6"></p>
        <a href="courses.html" class="text-blue-600 hover:underline"
          >Back to Courses</a
        >
      </div>
    </div>

    <script>
      // Load selected course from localStorage
      function loadSelectedCourse() {
        const courseInfo = document.getElementById("course-info");
        const selectedCourse = JSON.parse(
          localStorage.getItem("selectedCourse")
        );

        if (selectedCourse) {
          courseInfo.innerHTML = `
                    <h3 class="text-lg font-semibold">${selectedCourse.title}</h3>
                    <p class="text-gray-600">Instructor: ${selectedCourse.instructor}</p>
                    <p class="text-gray-600">Duration: ${selectedCourse.duration}</p>
                    <p class="text-xl font-bold mt-2">Total: $${selectedCourse.price}</p>
                `;
        } else {
          courseInfo.innerHTML =
            "<p>No course selected. Please go back to courses page.</p>";
        }
      }

      // Mock payment processing
      function processPayment() {
        const selectedCourse = JSON.parse(
          localStorage.getItem("selectedCourse")
        );
        const paymentForm = document.getElementById("payment-form");
        const successMessage = document.getElementById("success-message");
        const successDetails = document.getElementById("success-details");

        // Simulate payment processing delay
        setTimeout(() => {
          paymentForm.classList.add("hidden");
          successMessage.classList.remove("hidden");

          successDetails.innerHTML = `
                    You have successfully enrolled in <strong>${selectedCourse.title}</strong>.<br>
                    Amount paid: <strong>$${selectedCourse.price}</strong>.<br>
                    A confirmation has been sent to your email.
                `;

          // Clear the selected course from storage
          localStorage.removeItem("selectedCourse");
        }, 1500);
      }

      // Load course when page loads
      document.addEventListener("DOMContentLoaded", loadSelectedCourse);
    </script>
  </body>
</html>
